<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagangStatistikKediriKab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Magang Statistik Kediri Kabupaten</h2>
        <p>Sistem Pembuatan Laporan Otomatis</p>
    </header>
        <div>
            <form id="laporanForm">
            <label>Perihal Surat:</label>
            <input type="text"placeholder="Contoh Pemberitahuan">

            <label>Nama Kegiatan:</label>
            <input type="text" placeholder="Contoh Rapat Konsolidasi">

            <label>Nama Pelapor:</label>
            <input type="text" placeholder="Contoh Ainul">

            <label>Peserta Rapat:</label>
            <input type="text" placeholder="Contoh Andi">
                
            <label>Tanggal dan Waktu Rapat:</label>
            <input type="datetime-local">

            <label>Tempat Rapat:</label>
            <input type="text" placeholder="Contoh Kanzus Sholawat, Pekalongan">

            <label>Kesimpulan Rapat:</label>
            <input type="text" placeholder="Contoh ">

             <label>Poin Penting Dalam Rapat:</label>
            <input type="text" placeholder="Contoh ">

            <label>Catatan</label>
            <input type="text" placeholder="Contoh ">
                 
                <button type="button" onclick="previewPDF()">lihat</button>             
                
        </form>
        </div>
    
    <footer>

    </footer>

</html>
