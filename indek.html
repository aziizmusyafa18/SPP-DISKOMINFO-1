<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagangStatistikKediriKab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <div class="login-header">
                <h2>Magang Statistik Diskominfo Kab. Kediri</h2>
                <p>Sistem Pembuatan Laporan Otomatis</p>
            </div>
           
                <div class="form-group">
                    <label>Perihal Surat</label>
                    <input type="text" placeholder="Masukkan Jenis Surat" required>
                </div>
                <div class="form-group">
                    <label>Nama Kegiatan</label>
                    <input type="text" placeholder=" Masukkan Judul kegiatan" required>
                </div>
                <div class="form-group">
                    <label>Nama Pelapor</label>
                    <input type="text" placeholder="Contoh Mahendra Andi Setiawan" required>
                </div>
                <div class="form-group">
                    <label>Peserta Rapat</label>
                    <input type="text" placeholder="Masukkan Nama Partisipan" required>
                </div>
                <div class="form-group">
                    <label>Tanggal Dan Waktu Rapat</label>
                    <input type="datetime-local">
                </div>
                <div class="form-group">
                    <label>Tempat Rapat</label>
                    <input type="text" placeholder="Contoh Kanzus Sholawat, Pekalongan" required>
                </div>
                
                <button type="submit" class="btn-login">View Report</button>
                
                <div class="form-footer">
                    <p>&copy; 2026 Hak Cipta Magang Dinas Komunikasi dan Informatika</p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
