version: '3.8'

services:
  app:
    build: .
    container_name: spp-diskominfo-app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_NAME=spp_diskominfo
      - DB_USER=root
      - DB_PASS=secret
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: spp-diskominfo-db
    restart: always
    environment:
      - MYSQL_DATABASE=spp_diskominfo
      - MYSQL_ROOT_PASSWORD=secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/migration_stafs.sql:/docker-entrypoint-initdb.d/2-migration_stafs.sql
      - ./database/migration_laporan.sql:/docker-entrypoint-initdb.d/3-migration_laporan.sql

volumes:
  db_data:
